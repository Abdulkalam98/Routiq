# Local development with cloud services
# For full local setup, use docker-compose.local.yml
services:
  routiq-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routiq-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    restart: unless-stopped

